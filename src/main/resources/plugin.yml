name: FireMace
version: 1.0.0
main: com.stormai.plugin.FireMacePlugin
api-version: 1.21
description: Adds Fire and Ice Mace weapons with special area effects.
author: StormAI
commands:
  firemace:
    description: Reload the FireMace configuration.
    usage: /firemace reload
    permission: firemace.reload
permissions:
  firemace.reload:
    description: Allows reloading the configuration.
    default: op